name: Auto-merge clean PRs

# 道法自然：测试通过且无冲突的 PR 自动合并进 main，有冲突/失败的留待人工。
# 触发：CI 工作流跑完后（workflow_run）评估；PR 开/更/重开/转就绪 时兜底；
#        手动 workflow_dispatch 或定时 schedule 扫描全部开放 PR。
# 判定：base=main、非草稿、同仓库、mergeable=true，且最新提交的 CI「test」检查 success。

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write
  pull-requests: write
  checks: read
  actions: write # 允许合并后 dispatch release.yml

concurrency:
  group: auto-merge
  cancel-in-progress: false

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Merge clean + green PR(s)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // 统一逻辑：始终扫描全部开放 PR，合并 干净且 CI 通过 的那些。
            const prs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: 'open', base: 'main', per_page: 100,
            });
            const candidates = prs.filter(p =>
              !p.draft &&
              p.head.repo && p.head.repo.full_name === `${owner}/${repo}`
            );

            // 判断某提交的 CI 是否全部完成且成功（至少要有一个名字含 "test" 的检查）。
            async function ciGreen(sha) {
              const { data } = await github.rest.checks.listForRef({
                owner, repo, ref: sha, per_page: 100,
              });
              const runs = data.check_runs || [];
              const testRuns = runs.filter(r => /test/i.test(r.name));
              if (testRuns.length === 0) return 'pending'; // CI 尚未登记
              if (testRuns.some(r => r.status !== 'completed')) return 'pending';
              if (testRuns.every(r => r.conclusion === 'success')) return 'green';
              return 'failed';
            }

            let mergedAny = false;
            for (const c of candidates) {
              const number = c.number;
              // mergeable 由 GitHub 异步计算，轮询直到已知。
              let pr = null;
              for (let i = 0; i < 10; i++) {
                pr = (await github.rest.pulls.get({ owner, repo, pull_number: number })).data;
                if (pr.mergeable !== null) break;
                await new Promise(r => setTimeout(r, 4000));
              }
              if (!pr || pr.state !== 'open') { core.info(`#${number}: not open, skip`); continue; }
              if (pr.draft) { core.info(`#${number}: draft, skip`); continue; }
              if (pr.mergeable === false) { core.info(`#${number}: has conflicts, leaving for manual resolution`); continue; }
              if (pr.mergeable !== true) { core.info(`#${number}: mergeability unknown, skip this run`); continue; }

              const ci = await ciGreen(pr.head.sha);
              if (ci === 'pending') { core.info(`#${number}: CI not finished, skip this run`); continue; }
              if (ci === 'failed') { core.warning(`#${number}: CI failing, leaving for fix`); continue; }

              try {
                await github.rest.pulls.merge({ owner, repo, pull_number: number, merge_method: 'merge' });
                core.notice(`#${number}: merged into main`);
                mergedAny = true;
              } catch (e) {
                core.warning(`#${number}: merge failed (${e.status}) ${e.message}`);
              }
            }

            // 自动合并由 GITHUB_TOKEN 完成，其 push 不触发 release.yml 的 on:push（GitHub 防递归）。
            // 故显式 dispatch（workflow_dispatch 是例外）把最新版同步到 Release。
            if (mergedAny) {
              try {
                await github.rest.actions.createWorkflowDispatch({ owner, repo, workflow_id: 'release.yml', ref: 'main' });
                core.notice('dispatched release.yml');
              } catch (e) {
                core.warning(`release dispatch failed (${e.status}) ${e.message}`);
              }
            }
